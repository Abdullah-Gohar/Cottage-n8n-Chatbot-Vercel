<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Compact Cottages</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Compact Cottages design tokens — mirrors cc-design-system.css */
        :root {
            --bg: #F5F1EA;
            --bg-soft: #ECE5D8;
            --bg-card: #FFFCF5;
            --bg-dark: #1F3028;
            --text: #2A2622;
            --text-muted: #6B6359;
            --text-soft: #8A8175;
            --border: #DDD3BF;
            --rule: #E6DDC8;
            --clay: #C97A50;
            --clay-deep: #A85D38;
            --teal: #1F4858;
            --sage: #8FA77B;
            --error: #B4462E;
            --font-sans: 'DM Sans', system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: 'Playfair Display', Georgia, "Times New Roman", serif;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-pill: 999px;
            --shadow-card: 0 2px 8px rgba(42, 38, 34, 0.07), 0 1px 2px rgba(42, 38, 34, 0.04);
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            background: var(--bg);
        }

        body.embed #app {
            max-width: none;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px 16px;
            background: var(--bg-dark);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        body.embed header {
            padding: 14px 18px 12px;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: var(--clay);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        body.embed .logo-mark {
            width: 36px;
            height: 36px;
        }

        .logo-mark span {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 17px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .header-text h1 {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 19px;
            letter-spacing: 0.5px;
            color: #F5F1EA;
            line-height: 1.1;
        }

        body.embed .header-text h1 {
            font-size: 16px;
        }

        .header-text p {
            font-size: 12px;
            color: rgba(245, 241, 234, 0.65);
            margin-top: 3px;
        }

        body.embed .header-text p {
            font-size: 11px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--sage);
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 8px var(--sage);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 8px var(--sage);
            }

            50% {
                opacity: 0.5;
                box-shadow: 0 0 14px var(--sage);
            }
        }

        #close-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            margin-left: 6px;
            border-radius: var(--radius-sm);
            line-height: 0;
            flex-shrink: 0;
        }

        #close-btn svg {
            width: 18px;
            height: 18px;
            stroke: rgba(245, 241, 234, 0.8);
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s;
        }

        #close-btn:hover svg {
            stroke: #fff;
        }

        body.embed #close-btn {
            display: block;
        }

        /* ── GATE ── */
        #gate {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            gap: 28px;
            animation: fadeIn 0.5s ease;
            overflow-y: auto;
        }

        .gate-copy {
            text-align: center;
        }

        .gate-copy h2 {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 38px;
            letter-spacing: 0.5px;
            line-height: 1.15;
            color: var(--teal);
            margin-bottom: 12px;
        }

        .gate-copy h2 span {
            color: var(--clay);
            font-style: italic;
        }

        .gate-copy p {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 340px;
            line-height: 1.6;
        }

        .gate-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-error {
            font-size: 11px;
            color: var(--error);
            letter-spacing: 0.3px;
            min-height: 14px;
        }

        .gate-form input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 15px;
            padding: 14px 18px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-shadow: var(--shadow-card);
        }

        .gate-form input:focus {
            border-color: var(--clay);
        }

        .gate-form input::placeholder {
            color: var(--text-soft);
        }

        .gate-form input.invalid {
            border-color: var(--error);
        }

        .gate-form input.valid {
            border-color: var(--sage);
        }

        .btn-start {
            background: var(--clay);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 14px 32px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            width: 100%;
            margin-top: 4px;
        }

        .btn-start:hover {
            background: var(--clay-deep);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        .gate-disclosure {
            font-size: 11.5px;
            color: var(--text-soft);
            text-align: center;
            line-height: 1.5;
            max-width: 320px;
        }

        /* ── CHAT ── */
        #chat-wrapper {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar {
            width: 5px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: var(--radius-pill);
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-soft);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .msg.user .msg-label {
            color: var(--clay-deep);
        }

        .bubble {
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.65;
        }

        .msg.user .bubble {
            background: var(--clay);
            border: 1px solid var(--clay-deep);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
            color: #fff;
        }

        .msg.bot .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
            color: var(--text);
            box-shadow: var(--shadow-card);
        }

        .bubble a {
            color: var(--clay-deep);
            text-decoration: underline;
        }

        .msg.user .bubble a {
            color: #fff;
        }

        .bubble ul {
            padding-left: 18px;
            margin: 4px 0;
        }

        .bubble li {
            margin: 2px 0;
        }

        /* ── QUICK REPLIES ── */
        #quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 2px 0 4px;
            animation: slideUp 0.3s ease;
        }

        .chip {
            background: var(--bg-card);
            border: 1.5px solid var(--clay);
            border-radius: var(--radius-pill);
            color: var(--clay-deep);
            font-family: var(--font-sans);
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 9px 16px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }

        .chip:hover {
            background: var(--clay);
            color: #fff;
            transform: translateY(-1px);
        }

        .chip:active {
            transform: scale(0.98);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
            width: fit-content;
            box-shadow: var(--shadow-card);
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--clay);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ── INPUT AREA ── */
        #input-area {
            padding: 14px 24px 20px;
            border-top: 1px solid var(--rule);
            background: var(--bg);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #user-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 14px;
            padding: 13px 16px;
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.5;
            overflow-y: hidden;
            transition: border-color 0.2s;
            box-shadow: var(--shadow-card);
        }

        #user-input:focus {
            border-color: var(--clay);
        }

        #user-input::placeholder {
            color: var(--text-soft);
        }

        #send-btn {
            width: 48px;
            height: 48px;
            background: var(--clay);
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }

        #send-btn:hover {
            background: var(--clay-deep);
            transform: translateY(-1px);
        }

        #send-btn:active {
            transform: scale(0.95);
        }

        #send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .text-us-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-soft);
            text-decoration: none;
            margin-bottom: 10px;
            transition: color 0.2s;
        }
        .text-us-line:hover { color: var(--clay-deep); }
        .text-us-line svg { width: 13px; height: 13px; flex-shrink: 0; }

        .input-hint {
            font-size: 11px;
            color: var(--text-soft);
            margin-top: 8px;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 14px 18px 12px;
            }

            #messages {
                padding: 18px 16px 8px;
            }

            #input-area {
                padding: 12px 16px 16px;
            }

            .gate-copy h2 {
                font-size: 30px;
            }

            #app {
                max-width: 100%;
            }

            .input-hint {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="app">

        <header>
            <div class="logo-mark"><span>CC</span></div>
            <div class="header-text">
                <h1>Compact Cottages</h1>
                <p>Your compact living specialists</p>
            </div>
            <div class="status-dot"></div>
            <button id="close-btn" aria-label="Close chat" onclick="closeWidget()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 6l12 12M18 6L6 18"></path>
                </svg>
            </button>
        </header>

        <!-- Gate (name capture) -->
        <div id="gate">
            <div class="gate-copy">
                <h2>Hey,<br>let&rsquo;s <span>talk.</span></h2>
                <p>Tell us your name and we&rsquo;ll get straight to it. No fluff, no waiting.</p>
            </div>
            <div class="gate-form">
                <div class="field">
                    <input type="text" id="gate-name" placeholder="Your first name" maxlength="60"
                        autocomplete="given-name">
                    <span class="field-error" id="name-error"></span>
                </div>
                <button class="btn-start" onclick="startChat()">Start Chat</button>
            </div>
            <p class="gate-disclosure">You&rsquo;re chatting with Compact Cottages&rsquo; AI assistant. Most answers
                are instant.</p>
        </div>

        <!-- Chat -->
        <div id="chat-wrapper">
            <div id="messages"></div>
            <div id="input-area">
                <a class="text-us-line" href="sms:+16513840892">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    Text us instead
                </a>
                <div class="input-row">
                    <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Press Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</p>
            </div>
        </div>

    </div>

    <script>
        // ── CONFIG ───────────────────────────────────────────────────
        const CONFIG = {
            webhook: 'https://compact-cottages.app.n8n.cloud/webhook/183c74fa-9e19-43fb-aa0d-90c54f6bee31/chat',
            botLabel: 'Compact Cottages',
            // Page-aware openers: meet the visitor at the pain point of the page
            // they came from (draft copy — pending brand-voice review).
            greetings: {
                default: name => `Hey ${name}! I help folks figure out the right cottage for their land and budget. What brings you in today?`,
                home: name => `Hey ${name}! Most folks land here wondering what a cottage would actually cost on their land. Want help figuring that out?`,
                homes: name => `Hey ${name}! Looking through the models? Tell me what you need (bedrooms, budget, ADU or full home) and I'll point you to the right fit.`,
                'origami-home': name => `Hey ${name}! Got questions about the Origami? I can cover price, specs, timeline, and whether it fits your lot.`,
                'standard-cottage-2bed': name => `Hey ${name}! Got questions about the Standard Cottage? I can cover price, specs, timeline, and whether it fits your lot.`,
                inventory: name => `Hey ${name}! These are the homes we can deliver fastest. Want to see what's available and how quickly you could move in?`,
                start: name => `Hey ${name}! Budget is the number one question we get. Give me a rough idea of your situation and I'll get you a ballpark.`,
                configure: name => `Hey ${name}! Budget is the number one question we get. Give me a rough idea of your situation and I'll get you a ballpark.`,
                land: name => `Hey ${name}! Wondering what your land allows, or still looking for land? Tell me where you're at and I'll help.`,
                study: name => `Hey ${name}! Thinking about a feasibility study? I can explain what it covers and whether your property is a good fit.`,
                'how-we-build': name => `Hey ${name}! Curious how we actually build these? I can walk you through the offsite process, the timeline, and what's included.`,
                about: name => `Hey ${name}! Happy to tell you more about Compact Cottages. What would you like to know?`,
                faq: name => `Hey ${name}! Have a quick question? Ask away and I'll get you a straight answer.`,
                contact: name => `Hey ${name}! Rather not fill out the form? Ask me anything right here and I'll help.`
            },
            // Page-aware quick-reply chips (draft copy — pending brand-voice review)
            quickReplies: {
                default: ['Browse models', 'What will it cost?', 'Can I build on my land?'],
                homes: ['What sizes are available?', 'How much do they cost?', 'What’s included?'],
                'origami-home': ['What does the Origami cost?', 'What’s the timeline?', 'Will it fit my lot?'],
                'standard-cottage-2bed': ['What does it cost?', 'What’s the timeline?', 'Will it fit my lot?'],
                inventory: ['What’s available right now?', 'How much do they cost?', 'How fast could I move in?'],
                start: ['Get a ballpark estimate', 'How does financing work?', 'What’s the timeline?'],
                configure: ['Get a ballpark estimate', 'How does financing work?', 'What’s the timeline?'],
                land: ['Can I build on my land?', 'Do you have land available?', 'What about permits?'],
                study: ['Can I build on my land?', 'What does a feasibility study cover?', 'What will it cost?'],
                'how-we-build': ['How long does it take?', 'What’s included?', 'Is it modular?'],
                about: ['Browse models', 'What will it cost?', 'Where do you build?'],
                faq: ['What will it cost?', 'Can I build on my land?', 'How does financing work?'],
                contact: ['What will it cost?', 'Can I build on my land?', 'How does financing work?']
            },
            storage: {
                sessionKey: 'cc_chat_session',
                historyKey: 'cc_chat_history',
                expiryMs: 24 * 60 * 60 * 1000 // 24h
            }
        };

        const params = new URLSearchParams(location.search);
        const IS_EMBED = params.get('embed') === '1';
        const PAGE = (params.get('page') || '').toLowerCase();
        if (IS_EMBED) document.body.classList.add('embed');

        let userName = '';
        let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        let isWaiting = false;
        let chatStarted = false;

        // ── SESSION BRIDGE ───────────────────────────────────────────
        // The website tools (Budget Builder / Lot Finder) need to share this
        // chat's session id so a completed tool feeds back into the conversation.
        // A cid may arrive on our URL (passed by the embed loader); adopt it when
        // we have no active session of our own. We also broadcast our session id
        // to the parent so a tool page can post its results against it.
        const SESSION_RE = /^[A-Za-z0-9_\-]{6,80}$/;
        const INJECTED_CID = params.get('cid');
        if (INJECTED_CID && SESSION_RE.test(INJECTED_CID)) sessionId = INJECTED_CID;
        function broadcastSession() {
            if (window.parent !== window) {
                try { window.parent.postMessage({ type: 'cc-chat-session', sessionId: sessionId }, '*'); } catch (e) { /* ignore */ }
            }
        }

        // ── STORAGE ──────────────────────────────────────────────────
        function loadSession() {
            try {
                const raw = localStorage.getItem(CONFIG.storage.sessionKey);
                if (!raw) return null;
                const s = JSON.parse(raw);
                if (!s.sessionId || !s.name) return null;
                if (Date.now() - (s.lastActive || 0) > CONFIG.storage.expiryMs) {
                    localStorage.removeItem(CONFIG.storage.sessionKey);
                    localStorage.removeItem(CONFIG.storage.historyKey);
                    return null;
                }
                return s;
            } catch (e) { return null; }
        }

        function saveSession() {
            try {
                localStorage.setItem(CONFIG.storage.sessionKey, JSON.stringify({
                    sessionId: sessionId,
                    name: userName,
                    lastActive: Date.now()
                }));
            } catch (e) { /* storage unavailable — degrade gracefully */ }
            broadcastSession();
        }

        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem(CONFIG.storage.historyKey)) || [];
            } catch (e) { return []; }
        }

        function pushHistory(role, text) {
            try {
                const h = loadHistory();
                h.push({ role: role, text: text });
                // keep the transcript bounded
                localStorage.setItem(CONFIG.storage.historyKey, JSON.stringify(h.slice(-100)));
            } catch (e) { /* ignore */ }
            saveSession();
        }

        // ── SAFE RENDERING ───────────────────────────────────────────
        // Escape everything, then re-apply a minimal markdown subset.
        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderMarkdown(raw) {
            // n8n replies mix markdown with literal <br> tags; treat those as newlines
            // (whitelist conversion done before escaping — no raw HTML passes through).
            let s = escapeHTML(String(raw).replace(/<br\s*\/?>/gi, '\n'));
            // links: [label](https://url)
            s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            // bold / italic
            s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>');
            // bullet lists: consecutive lines starting with "- " or "* "
            s = s.replace(/((?:^|\n)[-*] .*(?:\n[-*] .*)*)/g, block => {
                const items = block.trim().split('\n')
                    .map(l => '<li>' + l.replace(/^[-*] /, '') + '</li>').join('');
                return '\n<ul>' + items + '</ul>';
            });
            // remaining newlines
            s = s.replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
            return s;
        }

        // ── GATE VALIDATION ──────────────────────────────────────────
        function setFieldState(inputEl, errorEl, message, state) {
            inputEl.classList.remove('invalid', 'valid');
            if (state === 'error') {
                inputEl.classList.add('invalid');
                errorEl.textContent = message;
            } else if (state === 'valid') {
                inputEl.classList.add('valid');
                errorEl.textContent = '';
            } else {
                errorEl.textContent = '';
            }
        }

        function validateGate() {
            const nameInput = document.getElementById('gate-name');
            const nameError = document.getElementById('name-error');

            if (!nameInput.value.trim()) {
                setFieldState(nameInput, nameError, 'Please enter your first name.', 'error');
                nameInput.focus();
                return false;
            }

            setFieldState(nameInput, nameError, '', 'valid');
            return true;
        }

        // ── INIT ─────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            const nameInput = document.getElementById('gate-name');
            const nameError = document.getElementById('name-error');

            nameInput.addEventListener('blur', () => {
                if (!nameInput.value.trim()) {
                    setFieldState(nameInput, nameError, 'Please enter your first name.', 'error');
                } else {
                    setFieldState(nameInput, nameError, '', 'valid');
                }
            });

            nameInput.addEventListener('input', () => {
                if (nameInput.value.trim()) {
                    setFieldState(nameInput, nameError, '', 'valid');
                }
            });

            nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') startChat(); });

            const chatInput = document.getElementById('user-input');
            chatInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            chatInput.addEventListener('input', () => {
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                chatInput.style.overflowY = chatInput.scrollHeight > 120 ? 'auto' : 'hidden';
            });

            // Restore a recent session: skip the gate, replay the transcript.
            const stored = loadSession();
            if (stored) {
                userName = stored.name;
                sessionId = stored.sessionId;
                openChatView();
                const history = loadHistory();
                history.forEach(m => appendMessage(m.role, m.text, { skipPersist: true }));
                if (history.length === 0) {
                    appendMessage('bot', greetingForPage(userName));
                }
                // Re-offer the starter chips until the visitor has sent something.
                if (!history.some(m => m.role === 'user')) {
                    showQuickReplies();
                }
            }
            // Tell the parent (and any tool page) which session we settled on.
            broadcastSession();
        });

        // Widget protocol: parent tells us we were opened; we tell parent to close.
        // Session bridge: parent can ask for our session id, or set one before a
        // chat has started (used when a tool wants results tied to this session).
        window.addEventListener('message', e => {
            if (!e.data) return;
            if (e.data.type === 'cc-chat-opened') {
                const target = chatStarted ? 'user-input' : 'gate-name';
                const el = document.getElementById(target);
                if (el) el.focus();
            }
            if (e.data.type === 'cc-chat-get-session') {
                broadcastSession();
            }
            if (e.data.type === 'cc-chat-set-session' && e.data.sessionId && !chatStarted && !loadSession()) {
                const s = String(e.data.sessionId);
                if (SESSION_RE.test(s)) { sessionId = s; broadcastSession(); }
            }
            // A tool page can hand us a message to send on the visitor's behalf
            // (e.g. their Budget Builder summary) so the conversation continues
            // visibly. We open the chat, adopt the shared session, and send it.
            if (e.data.type === 'cc-chat-inject' && e.data.text) {
                const msg = String(e.data.text).slice(0, 1000);
                const now = Date.now();
                if (msg === lastInjectText && (now - lastInjectAt) < 15000) { ackInject(); return; }
                lastInjectText = msg; lastInjectAt = now;
                if (e.data.name && !userName) userName = String(e.data.name).slice(0, 60);
                if (!chatStarted) {
                    const stored = loadSession();
                    if (stored) { userName = userName || stored.name; sessionId = stored.sessionId; }
                    else if (e.data.sessionId && SESSION_RE.test(String(e.data.sessionId))) { sessionId = String(e.data.sessionId); }
                    openChatView();
                    saveSession();
                }
                ackInject();
                sendMessage(msg);
            }
        });

        let lastInjectText = '', lastInjectAt = 0;
        function ackInject() {
            if (window.parent !== window) {
                try { window.parent.postMessage({ type: 'cc-chat-inject-ack' }, '*'); } catch (e) { /* ignore */ }
            }
        }

        function closeWidget() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'cc-chat-close' }, '*');
            }
        }

        // ── CHAT INIT ────────────────────────────────────────────────
        function openChatView() {
            chatStarted = true;
            document.getElementById('gate').style.display = 'none';
            const chatWrapper = document.getElementById('chat-wrapper');
            chatWrapper.style.display = 'flex';
            chatWrapper.style.animation = 'fadeIn 0.4s ease';
        }

        function startChat() {
            if (!validateGate()) return;

            userName = document.getElementById('gate-name').value.trim();
            saveSession();
            openChatView();

            appendMessage('bot', greetingForPage(userName));
            showQuickReplies();
            document.getElementById('user-input').focus();
        }

        // ── PAGE-AWARE CONTENT ───────────────────────────────────────
        function pickForPage(map) {
            if (map[PAGE]) return map[PAGE];
            const prefix = Object.keys(map).find(k => k !== 'default' && PAGE.indexOf(k) === 0);
            return prefix ? map[prefix] : map.default;
        }

        function greetingForPage(name) {
            return pickForPage(CONFIG.greetings)(name);
        }

        function quickRepliesForPage() {
            return pickForPage(CONFIG.quickReplies);
        }

        function showQuickReplies() {
            const messages = document.getElementById('messages');
            const wrap = document.createElement('div');
            wrap.id = 'quick-replies';
            quickRepliesForPage().forEach(text => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.textContent = text;
                chip.onclick = () => {
                    removeQuickReplies();
                    sendMessage(text);
                };
                wrap.appendChild(chip);
            });
            messages.appendChild(wrap);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeQuickReplies() {
            const qr = document.getElementById('quick-replies');
            if (qr) qr.remove();
        }

        // ── MESSAGE HELPERS ──────────────────────────────────────────
        function appendMessage(role, text, opts) {
            opts = opts || {};
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = role === 'user' ? (userName || 'You') : CONFIG.botLabel;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (role === 'bot') {
                bubble.innerHTML = renderMarkdown(text);
            } else {
                bubble.textContent = text;
            }

            div.appendChild(label);
            div.appendChild(bubble);
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;

            if (!opts.skipPersist && !opts.ephemeral) pushHistory(role, text);
            return div;
        }

        function showTyping() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typing-msg';

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = CONFIG.botLabel;

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            div.appendChild(label);
            div.appendChild(indicator);
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing-msg');
            if (t) t.remove();
        }

        // ── SEND ─────────────────────────────────────────────────────
        async function sendMessage(presetText) {
            if (isWaiting) return;
            const input = document.getElementById('user-input');
            const text = (presetText !== undefined ? presetText : input.value).trim();
            if (!text) return;

            removeQuickReplies();
            input.value = '';
            input.style.height = 'auto';
            appendMessage('user', text);

            isWaiting = true;
            document.getElementById('send-btn').disabled = true;
            input.disabled = true;
            input.placeholder = 'Waiting for response...';
            showTyping();

            // The backend can take 20-40s (multi-step agent). Reassure the visitor
            // partway through, and never spin forever: abort after 90s.
            const reassure = setTimeout(function () {
                input.placeholder = 'Still working on it, one moment...';
            }, 16000);
            const controller = new AbortController();
            const hardTimeout = setTimeout(function () { controller.abort(); }, 90000);

            try {
                const res = await fetch(CONFIG.webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatInput: text,
                        sessionId: sessionId,
                        metadata: { name: userName, page: PAGE || undefined }
                    }),
                    signal: controller.signal
                });

                clearTimeout(reassure); clearTimeout(hardTimeout);
                removeTyping();
                if (!res.ok) throw new Error('Network error ' + res.status);

                const data = await res.json();
                const reply = data.output || data.text || data.message || data.response ||
                    (Array.isArray(data) && (data[0]?.output || data[0]?.text)) ||
                    'Got your message, give me a moment.';

                appendMessage('bot', reply);
            } catch (err) {
                clearTimeout(reassure); clearTimeout(hardTimeout);
                removeTyping();
                var msg = (err && err.name === 'AbortError')
                    ? "Sorry, that took longer than expected. Could you send that again, or tap 'Talk to an expert' and we'll follow up directly?"
                    : 'Something went wrong on my end. Try again in a moment.';
                appendMessage('bot', msg, { ephemeral: true });
                console.error(err);
            }

            isWaiting = false;
            document.getElementById('send-btn').disabled = false;
            input.disabled = false;
            input.placeholder = 'Type your message...';
            input.focus();
        }
    </script>

</body>
